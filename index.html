<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="javascript" href="script.js">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div class="header">
        <div><span title="לחיצה לשינוי שם משתמש" style="font-weight:bold;cursor: pointer;" onclick="openmodel2()" id="nametitle">שלום</span></div>
        <div><button onclick="openmodel()">פנייה חדשה</button></div>
        <div><center><img src="https://upload.wikimedia.org/wikipedia/he/thumb/a/a3/Israeli_Ministry_of_Transport_and_Road_Safety_Symbol.svg/1280px-Israeli_Ministry_of_Transport_and_Road_Safety_Symbol.svg.png" style="width:70px;height:50px;"></center>
        </div>
        <div class="logoutbtn">Logout</div>
    </div>


    <div class="overlay" id="overlay"> 
        <div class="modal" id="modal">
            <center><img src="https://upload.wikimedia.org/wikipedia/he/thumb/a/a3/Israeli_Ministry_of_Transport_and_Road_Safety_Symbol.svg/1280px-Israeli_Ministry_of_Transport_and_Road_Safety_Symbol.svg.png" style="width:100px;height:70px;"></center>
            <h1>טופס פניה למערכת רישוי כל</h1>

            <center>
            <input type="text" name="name" id="name" placeholder="* שם מלא"><br/><br/>
            <input type="number" name="id" id="id"  placeholder="* מספר תעודת זהות"><br/><br/>
            <textarea name="desc" id="desc" placeholder="* תיאור, מה אתה צריך"></textarea>
            </center>
            <br/><br/>

            <button onclick="submit()">שליחה</button>
            <button onclick="closemodal()" style="background-color:rosybrown;border:1px solid rosybrown;">סגירה</button>
        </div>
    </div>



        <div class="overlay" id="overlay2"> 
        <div class="modal" id="modal2">
            <h1>הכנס שם</h1>

            <center>
            <input type="text" name="name" id="nametitleinput" placeholder="* שם מלא"><br/><br/>
            </center>
            <br/>

            <button onclick="submit2()">שמירה</button>
            <button onclick="closemodal2()" style="background-color:rosybrown;border:1px solid rosybrown;">סגירה</button>
        </div>
    </div>


<script>
function openmodel(){
    const overlay = document.querySelector(".overlay");
    const modal = document.querySelector(".modal");

    overlay.style.display = "flex";
    modal.style.display = "block";

    setTimeout(() => {
        overlay.style.opacity = "1";
        modal.style.transform = "scale(1.3)";
        modal.style.opacity = "1";
    }, 10);
}


function openmodel2(){
    const overlay2 = document.getElementById("overlay2");
    const modal2 = document.getElementById("modal2");

    overlay2.style.display = "flex";
    modal2.style.display = "block";

    setTimeout(() => {
        overlay2.style.opacity = "1";
        modal2.style.transform = "scale(1.3)";
        modal2.style.opacity = "1";
    }, 10);
}


function closemodal(){
    const overlay = document.querySelector(".overlay");
    const modal = document.querySelector(".modal");

    overlay.style.display = "none";
    modal.style.display = "none";


    setTimeout(() => {
        overlay.style.opacity = "0";
        modal.style.transform = "scale(-1.5)";
        modal.style.opacity = "0";
    }, 10);
}

function closemodal2(){
    const overlay2 = document.getElementById("overlay2");
    const modal2 = document.getElementById("modal2");

    overlay2.style.display = "none";
    modal2.style.display = "none";


    setTimeout(() => {
        overlay2.style.opacity = "0";
        modal2.style.transform = "scale(-1.5)";
        modal2.style.opacity = "0";
    }, 10);
}

function submit() {
    let nameinp = document.getElementById("name");
    let descinp = document.getElementById("desc");
    let idinp = document.getElementById("id");

    if(nameinp.value === "" || descinp.value === "" || idinp.value === ""){
        alert("נא למלא את כל הפרטים בטופס.");
    } else {
        alert("נשלח הטופס בהצלחה: " + nameinp.value + " (" + idinp.value + ") - " + descinp.value);

        nameinp.value = "";
        descinp.value = "";
        idinp.value = "";

        closemodal();
    }
}


function submit2(){
    let nametitle = document.getElementById("nametitle");
    let nameinp2 = document.getElementById("name");
    let name3 = document.getElementById("name3");
    let nametitleinput = document.getElementById("nametitleinput");

    if(nametitleinput.value === ""){
        alert("נא למלא את השם המלא.");
    } else {
        nameinp2.value = nametitleinput.value;
        name3.value = nametitleinput.value;
        nametitle.innerText = "שלום, " + nametitleinput.value;
        nametitleinput.value = ""
        closemodal2();
    }
}
</script>



<center><div style="position:fixed;bottom:5px;width:98%;" class="footer">
<input type="text" id="name3" placeholder="שם">
<input type="text" id="desc3" placeholder="תיאור">
<input type="text" id="id3" placeholder="ID"><br/>
<button onclick="save()">שמור</button>
</div></center>

<script>
function save() {
    const name3 = document.getElementById("name3").value;
    const desc3 = document.getElementById("desc3").value;
    const id3 = document.getElementById("id3").value;

    const data = [
        ["שם מלא", "תעודת זהות", "תוכן הפנייה"],
        [name3, id3, desc3]
    ];

    let csv = data.map(row => row.join(",")).join("\n");

    const blob = new Blob([csv], { type: "text/csv" });
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "data.csv";
    a.click();
}
</script>

</body>
</html>
