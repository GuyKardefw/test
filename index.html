<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="javascript" href="script.js">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div class="header">
        <div><span style="font-weight:bold;">Hello, Guy</span></div>
        <div><button onclick="openmodel()">פנייה חדשה</button></div>
        <div class="logoutbtn">Logout</div>
    </div>


    <div class="overlay" id="overlay"> 

        <div class="modal" id="modal">
            <h1>טופס פניה למערכת רישוי כל</h1>


            <input type="text" name="name" id="name" placeholder="* שם מלא"><br/><br/>
            <input type="number" name="id" id="id"  placeholder="* מספר תעודת זהות"><br/><br/>
            <textarea name="desc" id="desc" placeholder="* תיאור, מה אתה צריך"></textarea>

            <br/><br/>

            <button onclick="submit()">שליחה</button>
            <button onclick="closemodal()" style="background-color:rosybrown;">סגירה</button>
        </div>
        
    </div>


<script>
function openmodel(){
    const overlay = document.querySelector(".overlay");
    const modal = document.querySelector(".modal");

    overlay.style.display = "flex";
    modal.style.display = "block";

    setTimeout(() => {
        overlay.style.opacity = "1";
        modal.style.transform = "scale(1.3)";
        modal.style.opacity = "1";
    }, 10);
}


function closemodal(){
    const overlay = document.querySelector(".overlay");
    const modal = document.querySelector(".modal");

    overlay.style.display = "none";
    modal.style.display = "none";


    setTimeout(() => {
        overlay.style.opacity = "0";
        modal.style.transform = "scale(-1.5)";
        modal.style.opacity = "0";
    }, 10);
}

function submit() {
    const nameinp = document.getElementById("name").value;
    const descinp = document.getElementById("desc").value;
    const idinp = document.getElementById("id").value;

    if(nameinp === "" || descinp === "" || idinp === ""){
        alert("נא למלא את כל הפרטים בטופס.");
    } else {
        alert("נשלח הטופס בהצלחה: " + nameinp + " (" + idinp + ") - " + descinp);
    }
}
</script>

</body>
</html>
